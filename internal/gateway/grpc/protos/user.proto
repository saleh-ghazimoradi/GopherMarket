syntax = "proto3";

package protos;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/saleh-ghazimoradi/GopherMarket/internal/gateway/grpc/protos";


message GetUserRequest {
  uint64 id = 1;
}

message GetUserProfileRequest {
  uint64 id =1;
}

message UpdateUserProfileRequest {
  uint64 id = 1;
  optional string first_name = 2;
  optional string last_name = 3;
  optional string phone = 4;
}

message GetUserResponse {
  uint64 id = 1;
  string email = 2;
  string first_name = 3;
  string last_name = 4;
  string phone = 5;
  string role = 6;
  bool is_active = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

service UserService {
  rpc GetUserById(GetUserRequest) returns (GetUserResponse);
  rpc GetUserProfile(GetUserProfileRequest) returns (GetUserResponse);
  rpc UpdateUserProfile(UpdateUserProfileRequest) returns (GetUserResponse);
}