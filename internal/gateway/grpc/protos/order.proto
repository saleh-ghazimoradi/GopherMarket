syntax = "proto3";

package protos;
import "google/protobuf/timestamp.proto";
import "internal/gateway/grpc/protos/product.proto";

option go_package = "github.com/saleh-ghazimoradi/GopherMarket/internal/gateway/grpc/protos";

message CreateOrderRequest {
  uint64 user_id = 1;
}

message GetOrderRequest {
  uint64 user_id = 1;
  uint64 order_id = 2;
}

message GetOrdersRequest {
  uint64 user_id = 1;
  int32 page = 2;
  int32 limit = 3;
}

message GetOrdersResponse {
  repeated OrderResponse orders = 1;
  PaginatedMeta meta = 2;
}

message OrderResponse {
  uint64 id = 1;
  uint64 user_id = 2;
  string status = 3;
  double total_amount = 4;
  repeated OrderItemResponse order_items = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message OrderItemResponse {
  uint64 id = 1;
  ProductResponse product = 2;
  int32 quantity = 3;
  double price = 4;
  google.protobuf.Timestamp created_at = 5;
}

service OrderService {
  rpc CreateOrder(CreateOrderRequest) returns (OrderResponse);
  rpc GetOrder(GetOrderRequest) returns (OrderResponse);
  rpc GetOrders(GetOrdersRequest) returns (GetOrdersResponse);
}