services:
  postgresql:
    image: postgres:18-alpine
    container_name: ${POSTGRES_NAME}
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - ${POSTGRES_PORT}:5432

  redis:
    image: redis:latest
    container_name: ${REDIS_NAME}
    restart: always
    ports:
      - ${REDIS_PORT}:6379
    volumes:
      - redis-data:/data

  cdn:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./pkg/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./uploads:/var/www/uploads
    depends_on:
      - localstack

  localstack:
    image: localstack/localstack:latest
    container_name: localstackGopherMarket
    environment:
      - SERVICES=s3,sqs
      - DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - DATA_DIR=/tmp/localstack/data
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
      - ./pkg/aws/init/init-localstack.sh:/etc/localstack/init/ready.d/init.sh

  mailpit:
    image: axllent/mailpit:v1.27
    container_name: mailpitGopherMarket
    restart: unless-stopped
    volumes:
      - mailpit_data:/data
    ports:
      - 8025:8025
      - 1025:1025
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaegerGopherMarket
    restart: unless-stopped
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"   # UI
      - "4317:4317"     # OTLP gRPC (optional)
      - "4318:4318"     # OTLP HTTP
    volumes:
      - jaeger_data:/tmp

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheusGopherMarket
    restart: unless-stopped
    ports:
      - "9090:9090"                     
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - jaeger

  grafana:
    image: grafana/grafana:latest
    container_name: grafanaGopherMarket
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin   # change in production!
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  db-data:
  redis-data:
  localstack_data:
  mailpit_data:
  jaeger_data:
  grafana_data: